apiVersion: v1
kind: Namespace
metadata:
  name: dev
  labels:
    name: dev
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: staradmin-n-05-03-2026-deployment
  namespace: dev
spec:
  selector:
    matchLabels:
      app: staradmin-n-05-03-2026
  template:
    metadata:
      labels:
        app: staradmin-n-05-03-2026
    spec:
      containers:
      - name: staradmin-n-05-03-2026
        image: thanh680/staradmin-n-05-03-2026:1.0
        ports:
        - containerPort: 5005
---
apiVersion: v1
kind: Service
metadata:
  name: staradmin-n-05-03-2026-service
  namespace: dev
spec:
  type: NodePort
  selector:
    app: staradmin-n-05-03-2026
  ports:
    - port: 85
      targetPort: 5005
      name: staradmin-n-05-03-2026