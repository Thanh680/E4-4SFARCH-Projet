apiVersion: v1
kind: Namespace
metadata:
  name: preprod
  labels:
    name: preprod
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: adminlte-n-05-03-2026-deployment
  namespace: preprod
spec:
  replicas: 3
  selector:
    matchLabels:
      app: adminlte-n-05-03-2026
  template:
    metadata:
      labels:
        app: adminlte-n-05-03-2026
    spec:
      containers:
      - name: adminlte-n-05-03-2026
        image: thanh680/adminlte-n-05-03-2026:1.0
        ports:
        - containerPort: 5005
---
apiVersion: v1
kind: Service
metadata:
  name: adminlte-n-05-03-2026-service
  namespace: preprod
spec:
  type: NodePort
  selector:
    app: adminlte-n-05-03-2026
  ports:
  - port: 85
    targetPort: 5005
    name: adminlte-n-05-03-2026