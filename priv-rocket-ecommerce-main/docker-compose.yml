version: '3.8'
services:
  db:
    image: postgres:15
    container_name: rocket_db
    restart: always
    environment:
      POSTGRES_DB: rocketdb
      POSTGRES_USER: root
      POSTGRES_PASSWORD: root
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data

  rocket-django:
    container_name: rocket_django
    restart: always
    build: .
    environment:
      DATABASE_HOST: db
      DATABASE_NAME: rocketdb
      DATABASE_USER: root
      DATABASE_PASSWORD: root
    networks:
      - db_network
      - web_network
  nginx:
    container_name: nginx
    restart: always
    image: "nginx:latest"
    ports:
      - "5085:5085"
    volumes:
      - ./nginx:/etc/nginx/conf.d
    networks:
      - web_network
    depends_on: 
      - rocket-django
networks:
  db_network:
    driver: bridge
  web_network:
    driver: bridge
volumes:
  db_data: